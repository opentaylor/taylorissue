name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: --bundles nsis
          - platform: windows-11-arm
            args: --bundles nsis

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Configure Apple code signing
        if: runner.os == 'macOS'
        run: |
          if [ -z "$CERT" ]; then
            echo "No Apple certificate configured, skipping code signing"
            exit 0
          fi
          {
            echo "APPLE_CERTIFICATE<<APPLE_CERT_EOF"
            echo "$CERT"
            echo "APPLE_CERT_EOF"
            echo "APPLE_CERTIFICATE_PASSWORD=$CERT_PASS"
            echo "APPLE_SIGNING_IDENTITY=$SIGN_ID"
            echo "APPLE_ID=$APPLE_ID_VAL"
            echo "APPLE_PASSWORD=$APPLE_PASS_VAL"
            echo "APPLE_TEAM_ID=$TEAM_ID"
          } >> "$GITHUB_ENV"
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGN_ID: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_VAL: ${{ secrets.APPLE_ID }}
          APPLE_PASS_VAL: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          tagName: app-v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
